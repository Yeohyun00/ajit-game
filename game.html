<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>아지트</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="아지트">
  <meta name="theme-color" content="#c49a5a">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <style>
    @font-face {
      font-family: 'BMHANNA';
      src: url('BMHANNAAir_otf.otf') format('opentype'),
           url('BMHANNAAir_ttf.ttf') format('truetype');
      font-weight: normal; font-style: normal;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow: hidden; height: 100dvh; }
    body {
      height: 100dvh; overflow: hidden;
      background: #e8d8b8;
      display: flex; justify-content: center;
      font-family: 'BMHANNA', "Apple SD Gothic Neo", system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    .app {
      position: relative;
      width: min(100vw, 390px);
      height: 100dvh;
      overflow: hidden;
    }

    /* ══ 방 (전체 배경) ══ */
    .room-stage {
      position: absolute; inset: 0;
      touch-action: none;
    }
    .room-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block; pointer-events: none;
    }
    #furnitureLayer { position: absolute; inset: 0; pointer-events: none; }
    #artistLayer    { position: absolute; inset: 0; }

    /* ══ HUD — Figma 50-97 (402→390px 스케일) ══ */
    :root { --sat: max(16px, env(safe-area-inset-top)); }
    .hud { position: absolute; inset: 0; z-index: 80; pointer-events: none; }
    .hud > * { pointer-events: auto; }

    /* 친밀도 chip */
    .fp-chip {
      position: absolute;
      left: 20px;
      top: calc(var(--sat) + 14px);
      background: rgba(255,255,255,0.5);
      border: 1.5px solid rgba(184,129,41,0.8);
      border-radius: 16px;
      padding: 15px 20px;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .fp-artist-name { font-size: 14px; color: #000; letter-spacing: 0.2px; white-space: nowrap; }
    .fp-row { display: flex; align-items: center; }
    .fp-lv { font-size: 14px; color: #4a2f1a; letter-spacing: 0.2px; margin-top: 4px; margin-right: 10px; white-space: nowrap; }
    .fp-pct-pill {
      display: flex; align-items: center; gap: 5px;
      background: #f79f9f; border-radius: 20px; padding: 5px 12px;
    }
    .fp-heart { color: #c04060; font-size: 12px; line-height: 1; }
    .fp-pct-text { font-size: 11px; color: #000; letter-spacing: 0.2px; white-space: nowrap; }

    /* 재화 chip */
    .coin-chip {
      position: absolute;
      right: 12px;
      top: calc(var(--sat) + 14px);
      display: flex; align-items: center; gap: 10px;
      background: rgba(183,137,106,0.4);
      border: 1.5px solid rgba(184,129,41,0.8);
      border-radius: 16px;
      padding: 5px 10px;
    }
    .coin-icon-wrap { width: 30px; height: 30px; flex-shrink: 0; }
    .coin-icon-wrap img { width: 30px; height: 30px; object-fit: contain; display: block; }
    .coin-val { font-size: 15px; color: #000; letter-spacing: 0.2px; white-space: nowrap; }

    /* 촬영/설정 — Figma camera left:288→279px top:82, settings left:340→330px top:80 */
    .util-row {
      position: absolute;
      right: 12px;
      top: calc(var(--sat) + 66px);
      display: flex; gap: 4px; align-items: center;
      z-index: 200;
    }
    .util-btn { background: none; border: none; padding: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .util-btn img { width: 42px; height: 42px; object-fit: contain; }

    /* ══ 네비게이션 — Figma 70-507: left:20px, auto-width, rounded ══ */
    .bottom-nav {
      position: absolute;
      bottom: max(16px, env(safe-area-inset-bottom));
      left: 20px;
      width: auto;
      padding: 5px 4px;
      background: none;
      border-radius: 20px;
      display: flex; align-items: center; gap: 15px;
      z-index: 200;
    }
    .bottom-nav.sheet-open { z-index: 90; }
    .nav-item {
      display: grid; place-items: start;
      background: none; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .nav-item img {
      grid-column: 1; grid-row: 1;
      height: 70px; width: auto; object-fit: contain;
      display: block; transition: transform .12s ease;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35)) drop-shadow(0 0 1px rgba(0,0,0,0.2));
      z-index: 0; position: relative;
    }
    .nav-item:active img { transform: scale(0.9); }
    .nav-label {
      grid-column: 1; grid-row: 1;
      align-self: end; justify-self: center;
      font-family: 'BMHANNA', sans-serif;
      font-size: 12px; color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6), 0 0 8px rgba(0,0,0,0.4);
      padding-bottom: 3px; pointer-events: none;
      position: relative; z-index: 1;
    }

    /* ══ 바텀 시트 ══ */
    .backdrop {
      position: absolute; inset: 0;
      background: transparent;
      z-index: 100; pointer-events: none;
    }
    .backdrop.show { pointer-events: auto; }

    /* 모든 시트 공통 */
    .sheet {
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      height: 270px;
      z-index: 110;
      background: #fff8f0;
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -6px 30px rgba(80,40,10,0.18);
      transform: translateY(120vh);
      transition: transform .3s cubic-bezier(.32,.72,0,1);
      display: flex; flex-direction: column;
      overflow: hidden;
      pointer-events: none;
      padding-top: 10px;
    }
    .sheet.open { transform: translateY(0); pointer-events: auto; }

    #dialogSheet { z-index: 120; height: auto; max-height: 55vh; }

    .sheet-handle {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 14px 0; cursor: grab;
    }
    .handle-bar { width: 34px; height: 4px; border-radius: 2px; background: #d8c8b0; margin-bottom: 8px; }
    .sheet-head { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-bottom: 2px; }
    .sheet-title { font-size: 16px; font-weight: 900; color: #3a2010; }
    .sheet-close {
      width: 26px; height: 26px; border-radius: 999px;
      background: #ede0cc; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #8a6040; font-weight: 900;
      -webkit-tap-highlight-color: transparent;
    }

    /* ══ 대화 시트 ══ */
    #dialogSheet {
      background: #fff8f0;
      box-shadow: 0 -6px 30px rgba(80,40,10,0.18);
      border-radius: 22px 22px 0 0;
      overflow: hidden;
      padding: 0;
    }
    .dialog-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px 8px;
      border-bottom: 1px solid #ede0cc;
    }
    .dialog-header-name {
      font-size: 16px; font-weight: 900; color: #3a2010;
    }
    .dialog-header-close {
      width: 26px; height: 26px; border-radius: 999px;
      background: #ede0cc; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #8a6040; font-weight: 900;
      -webkit-tap-highlight-color: transparent; font-family: inherit;
    }
    .dialog-body {
      flex: 1; display: flex; flex-direction: column;
      gap: 8px; padding: 12px 14px max(16px, env(safe-area-inset-bottom));
      overflow-y: auto;
    }
    /* 말풍선 */
    .dialog-bubble {
      width: 100%;
      background: #fff3e0; border-radius: 16px;
      border: 1px solid #e8d0b0;
      padding: 14px 16px;
      font-size: 15px; color: #2e1a0e; line-height: 1.55;
      word-break: keep-all;
    }
    .dialog-speaker {
      font-weight: 900; color: #c8683a; margin-right: 4px;
    }
    .dialog-speaker::after { content: ':'; }
    /* 선택지 버튼들 */
    .dialog-choices { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .choice-btn {
      width: 100%; padding: 11px 16px;
      background: #fff8f0; border: 1px solid #e8d0b0;
      border-radius: 12px; cursor: pointer;
      font-size: 14px; color: #3a2010; font-weight: 800;
      text-align: left; font-family: inherit;
      -webkit-tap-highlight-color: transparent; transition: background .12s;
    }
    .choice-btn:active, .choice-btn.selected { background: #f0c878; border-color: #c8a060; }
    .dialog-fp-gain { text-align: center; font-size: 12px; color: #c8683a; padding-bottom: 4px; }

    /* ══ 상점 / 창고 공통 ══ */
    .tab-row {
      flex-shrink: 0; display: flex; gap: 6px;
      padding: 8px 14px 8px; border-bottom: 1px solid #ede0cc;
    }
    .s-tab {
      padding: 6px 14px; border: none;
      background: #ede0cc; border-radius: 999px;
      font-size: 12px; font-weight: 800; color: #8a6040;
      cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all .12s;
      font-family: 'BMHANNA', sans-serif;
    }
    .s-tab.active { background: #c8683a; color: #fff; }
    .sheet-coin-row {
      flex-shrink: 0; display: flex; justify-content: flex-end; align-items: center;
      gap: 4px; padding: 6px 14px 2px; font-size: 12px; font-weight: 800; color: #3a2010;
    }
    .scroll-area {
      flex: 1; overflow-x: auto; overflow-y: hidden;
      padding: 6px 16px 16px; overscroll-behavior-x: contain;
      /* 우측 끝 페이드로 더 있음을 암시 */
      -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
      mask-image: linear-gradient(to right, black 80%, transparent 100%);
    }
    .scroll-area::-webkit-scrollbar { display: none; }
    .item-grid { display: flex; flex-direction: row; gap: 10px; width: max-content; padding-right: 24px; }

    .item-card {
      background: #fff8f0; border: 1px solid #e8d0b0; border-radius: 14px;
      padding: 12px 10px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      width: 108px; flex-shrink: 0;
    }
    .item-emoji { font-size: 32px; line-height: 1; }
    .item-thumb { height: 50px; display: flex; align-items: center; justify-content: center; }
    .item-thumb img { max-height: 50px; max-width: 100%; object-fit: contain; }
    .item-name { font-size: 11px; font-weight: 800; color: #3a2010; text-align: center; }
    .price-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 5px 12px; border-radius: 999px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 900;
      -webkit-tap-highlight-color: transparent; transition: all .15s;
      white-space: nowrap;
    }
    .price-pill.buyable  { background: #c8683a; color: #fff; }
    .price-pill.done     { background: #b8d8a0; color: #3a6020; cursor: default; }
    .price-pill.cant     { background: #e0d0c0; color: #a09080; cursor: default; }
    .price-pill.owned-pill { background: #d0c8c0; color: #7a6858; cursor: default; }
    .item-btn {
      width: 100%; padding: 6px; border: none; border-radius: 8px;
      font-size: 11px; font-weight: 900; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .item-btn.place { background: #5888d8; color: #fff; }
    .item-btn.give  { background: #d85888; color: #fff; }

    .storage-hint {
      flex-shrink: 0; margin: 4px 12px 0;
      padding: 8px 12px; background: #fff3e0; border-radius: 10px;
      font-size: 11px; font-weight: 700; color: #c8683a; line-height: 1.5;
    }
    .storage-empty {
      grid-column: 1/-1; text-align: center; padding: 28px 0;
      color: #b0906a; font-size: 12px; font-weight: 700; line-height: 1.8;
    }

    /* ══ 아지트 이동 시트 ══ */
    .ajit-list { display: flex; flex-direction: column; gap: 8px; padding: 6px 14px 0; flex: 1; overflow-y: auto; }
    .ajit-card {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 12px;
      background: #fff3e0; border: 1px solid #e8d0b0;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .ajit-card.current { border: 2px solid #c8683a; }
    .ajit-card:active { opacity: .8; }
    .ajit-card-av {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg,#e8d0b0,#f8e8d0); overflow: hidden; flex-shrink: 0;
      border: 2px solid #dcc8a8;
    }
    .ajit-card-av img { width:110%; height:110%; object-fit:cover; object-position:center 8%; margin-left:-5%; }
    .ajit-card-name { font-size: 13px; font-weight: 900; color: #2e1a0e; }
    .ajit-card-sub  { font-size: 11px; color: #8a6040; font-weight: 600; margin-top: 1px; }
    .ajit-now { margin-left: auto; font-size: 10px; font-weight: 800; color: #c8683a; background: #ffe0cc; padding: 3px 8px; border-radius: 999px; }
    .nfc-btn {
      margin: 8px 14px 14px; padding: 13px;
      border: 2px dashed #d8c0a0; border-radius: 12px;
      background: none; cursor: pointer; -webkit-tap-highlight-color: transparent;
      font-size: 13px; font-weight: 800; color: #8a6040;
      display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0;
    }

    /* ══ 아티스트 ══ */
    .artist-actor {
      position: absolute; transform: translate(-50%,-50%);
      z-index: var(--depth,50);
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .artist-actor.highlighted { filter: drop-shadow(0 0 14px rgba(255,180,80,.9)); }
    .artist-sprite { height: 165px; width: auto; display: block; filter: drop-shadow(0 8px 14px rgba(40,10,0,.28)); }
    #playerActor .artist-sprite { height: 170px; }
    .artist-sprite.flip { transform: scaleX(-1); }
    .artist-actor.moving .artist-sprite { animation: aBob .42s ease-in-out infinite; }
    .artist-actor.moving .artist-sprite.flip { animation: aBobF .42s ease-in-out infinite; }
    @keyframes aBob  { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-5px)} }
    @keyframes aBobF { 0%,100%{transform:scaleX(-1)translateY(0)} 50%{transform:scaleX(-1)translateY(-5px)} }

    .name-tag {
      position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
      background: rgba(46,26,14,.75); color: #fff;
      font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 999px; white-space: nowrap;
    }
    .talk-hint {
      position: absolute; top: -54px; left: 50%; transform: translateX(-50%);
      background: #c8683a; color: #fff; border: none; border-radius: 999px;
      padding: 5px 12px; font-size: 11px; font-weight: 900;
      cursor: pointer; white-space: nowrap; pointer-events: auto;
      display: none; animation: floatBob 1.1s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }
    .talk-hint.show { display: block; }
    @keyframes floatBob { 0%,100%{transform:translateX(-50%)translateY(0)} 50%{transform:translateX(-50%)translateY(-4px)} }

    .gift-badge {
      position: absolute; bottom: calc(100% + 4px); left: 50%;
      transform: translateX(-50%);
      font-size: 22px; pointer-events: none; z-index: 65;
      animation: giftBob .5s ease-in-out infinite alternate;
      display: none;
    }
    @keyframes giftBob {
      from { transform: translateX(-50%) translateY(0); }
      to   { transform: translateX(-50%) translateY(-5px); }
    }
    .speech-bubble {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: #fff; border-radius: 14px; padding: 9px 14px;
      box-shadow: 0 4px 18px rgba(80,40,10,.18);
      font-size: 13px; font-weight: 700; color: #2e1a0e;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity .18s; z-index: 60;
      max-width: min(280px, 75vw);
    }
    .speech-bubble::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 7px solid transparent; border-top-color: #fff;
    }
    .speech-bubble.show { opacity: 1; }

    .reaction-pop {
      position: absolute; font-size: 30px; pointer-events: none; z-index: 70;
      animation: rFly 1.3s ease forwards;
    }
    @keyframes rFly {
      0%  {opacity:1;transform:translateY(0)scale(.5)}
      25% {transform:translateY(-22px)scale(1.25);opacity:1}
      100%{transform:translateY(-76px)scale(.9);opacity:0}
    }

    /* ══ 배치된 가구 ══ */
    .furn-placed {
      position: absolute;
      z-index: var(--depth,40);
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent; pointer-events: auto;
    }
    .furn-placed img { display: block; pointer-events: none; }
    .store-popup { display: none; }

    @keyframes furnPlace {
      0%   { transform: scale(0.2); opacity: 0; }
      60%  { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes furnRemove {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.1); opacity: 0; }
    }
    .furn-placed.placing  { animation: furnPlace  0.42s cubic-bezier(.34,1.56,.64,1) forwards; }
    .furn-placed.removing { animation: furnRemove 0.28s ease-in forwards; pointer-events: none; }

    /* 가구 효과 오버레이 */
    .furn-fx {
      position: absolute; transform: translate(-50%,-50%);
      pointer-events: none; z-index: 500;
      width: 120px; height: 120px; object-fit: contain;
    }
    @keyframes fxPop {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4); }
      30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
      70%  { opacity: 1; transform: translate(-50%,-50%) scale(0.95); }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
    }
    .furn-fx { animation: fxPop 0.6s ease-out forwards; }

    /* NFC 스플래시 */
    .nfc-splash {
      position: absolute; inset: 0; z-index: 600;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55); pointer-events: none;
    }
    @keyframes nfcBurst {
      0%   { transform: scale(0.3); opacity: 0; }
      50%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .nfc-splash-inner {
      animation: nfcBurst 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .nfc-splash-icon { font-size: 72px; line-height: 1; }
    .nfc-splash-text {
      font-size: 22px; color: #fff; font-weight: 900; text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5); line-height: 1.4;
    }

    /* ══ 탭 링 ══ */
    .tap-ring {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 50;
      border: 2px solid rgba(255,255,255,0.75);
      transform: translate(-50%,-50%) scale(0.2);
      animation: tapRingAnim 0.55s ease-out forwards;
    }
    @keyframes tapRingAnim {
      0%   { transform: translate(-50%,-50%) scale(0.2); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(2);   opacity: 0; }
    }

    /* ══ 선물 고스트 ══ */
    #giftGhost {
      position: absolute; pointer-events: none; z-index: 300;
      font-size: 42px; display: none; transform: translate(-50%,-50%);
    }
    #giftGhost img { width: 70px; height: 70px; object-fit: contain; display: block; }

    /* ══ 토스트 & 파티클 ══ */
    .toast-layer { position: absolute; inset: 0; z-index: 400; pointer-events: none; }
    /* 일반 토스트 */
    .toast {
      position: absolute;
      top: 120px; left: 50%; transform: translateX(-50%);
      background: rgba(46,26,10,.9); color: #fff;
      padding: 9px 18px; border-radius: 999px;
      font-size: 12px; font-weight: 800; white-space: nowrap;
      animation: toastPop 2.5s ease forwards;
    }
    /* 친밀도 토스트 */
    .fp-toast {
      position: absolute;
      top: 120px; left: 50%; transform: translateX(-50%);
      background: rgba(200,104,58,.92); color: #fff;
      padding: 9px 20px; border-radius: 999px;
      font-size: 14px; font-weight: 900; white-space: nowrap;
      animation: toastPop 2.2s ease forwards;
    }
    @keyframes toastPop {
      0%{opacity:0;transform:translate(-50%,6px)}
      14%,78%{opacity:1;transform:translate(-50%,0)}
      100%{opacity:0;transform:translate(-50%,-6px)}
    }
    .fp-gain-float {
      position: absolute; left: 50%; top: 42%;
      transform: translate(-50%,-50%);
      font-size: 20px; font-weight: 900; color: #c8683a;
      pointer-events: none; animation: fpFloat 1.4s ease forwards;
    }

.modal-quit-btn {

/* ══ 걷기 범위: 4점 볼록다각형 (이미지 픽셀 402×874 → % 변환) ══ */
const QUADS = {
  dio: [
    {x:20/402*100,  y:459/874*100},   // (20,459)
    {x:165/402*100,y:380/874*100},   // (165,380)
    {x:359/402*100,y:507/874*100},   // (359,507)
    {x:219/402*100,y:595/874*100},   // (219,595)
  ],
  kai: [
    {x:19/402*100,  y:523/874*100},  // (19,523)
    {x:123/402*100, y:431/874*100},  // (123,431)
    {x:303/402*100, y:518/874*100},  // (303,518)
    {x:184/402*100, y:734/874*100},  // (184,734)
  ],
};
function curQuad(){ return QUADS[S.currentArtist] || QUADS.dio; }

/* scanline: 현재 y에서 좌/우 경계 x 반환 */
function quadXRange(y){
  const QUAD=curQuad();
  const xs=[];
  for(let i=0;i<QUAD.length;i++){
    const a=QUAD[i],b=QUAD[(i+1)%QUAD.length];
    if((a.y<=y&&b.y>y)||(b.y<=y&&a.y>y)){
      const t=(y-a.y)/(b.y-a.y);
      xs.push(a.x+(b.x-a.x)*t);
    }
  }
  if(xs.length<2) return null;
  return {min:Math.min(...xs),max:Math.max(...xs)};
}
function isInQuad(x,y){
  const QUAD=curQuad();
  let inside=false;
  for(let i=0,j=QUAD.length-1;i<QUAD.length;j=i++){
    const {x:xi,y:yi}=QUAD[i],{x:xj,y:yj}=QUAD[j];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
/* 쿼드 안 포인트 체크 (특정 QUAD 배열 사용) */
function inQuad(x,y,QUAD){
  let inside=false;
  for(let i=0,j=QUAD.length-1;i<QUAD.length;j=i++){
    const {x:xi,y:yi}=QUAD[i],{x:xj,y:yj}=QUAD[j];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
/* 쿼드 안 랜덤 좌표 (rejection sampling) — artistId로 쿼드 지정 */
function randTarget(artistId){
  const QUAD=QUADS[artistId||S.currentArtist]||QUADS.dio;
  // 쌍선형 보간 — convex quad 안의 점을 항상 보장
  const [V0,V1,V2,V3]=QUAD;
  const s=Math.random(), t=Math.random();
  const ax=V0.x+(V1.x-V0.x)*s, ay=V0.y+(V1.y-V0.y)*s;
  const bx=V3.x+(V2.x-V3.x)*s, by=V3.y+(V2.y-V3.y)*s;
  return {x:ax+(bx-ax)*t, y:ay+(by-ay)*t};
}

  if(dist<0.5){ if(player.dx||player.dy){ player.dx=0; player.dy=0; stopPlayerWalk(); } return; }
  const step=Math.min(SPD,dist);
  const nx=player.x+(ddx/dist)*step, ny=player.y+(ddy/dist)*step;
  const a=curA();

    player.dx=nx-player.x; player.dy=ny-player.y; player.x=nx; player.y=ny; syncPlayer();

}

const SPD=0.38; let wanderTimer, frozenUntil=0;
const COLLISION_R = 9; // % 거리 임계값 (아티스트-플레이어 충돌 반경)
function charDist(ax,ay,bx,by){ return Math.hypot((ax-bx)*0.6, ay-by); }
function tooClose(nx,ny,other){ return charDist(nx,ny,other.x,other.y)<COLLISION_R; }

function schedWander(){
  clearTimeout(wanderTimer);
  wanderTimer=setTimeout(()=>{
    if(Date.now()>frozenUntil){
      ARTISTS.forEach(a=>{
        if(a.x===undefined) return;
        let t; let tries=0;
        do { t=randTarget(a.id); tries++; } while(tries<30&&tooClose(t.x,t.y,player));
        a.tx=t.x; a.ty=t.y;
      });
    }
    schedWander();
  },8000+Math.random()*7000);
}
function moveNpc(){
  const a=curA(); if(!a||!artistEl||isReacting) return;
  if(Date.now()<frozenUntil){
    a.tx=a.x; a.ty=a.y; a.dx=0; a.dy=0;
    stopWalkAnim(); return;
  }
  const ddx=a.tx-a.x, ddy=a.ty-a.y, dist=Math.hypot(ddx,ddy);
  if(dist<0.3){
    if(a.dx||a.dy){ a.dx=0; a.dy=0; stopWalkAnim(); }
    return;
  }
  const step=Math.min(SPD,dist);
  const nx=a.x+(ddx/dist)*step, ny=a.y+(ddy/dist)*step;
  if(!tooClose(nx,ny,player)){
    a.dx=nx-a.x; a.dy=ny-a.y; a.x=nx; a.y=ny;
    syncArtist();
  } else {
    a.dx=0; a.dy=0; stopWalkAnim();
  }
}

/* object-fit:cover 적용 후 실제 이미지 렌더 좌표 계산
   모바일 화면비가 달라도 가구가 배경 위 정확한 위치에 오도록 */
function getBgTransform(){
  const img=document.querySelector('.room-bg');
  const stage=document.getElementById('roomStage');
  const sw=stage.offsetWidth, sh=stage.offsetHeight;
  const iw=img.naturalWidth||402, ih=img.naturalHeight||874;
  const s=Math.max(sw/iw, sh/ih);           // cover: 큰 쪽 기준 스케일
  const dw=iw*s, dh=ih*s;
  const ox=(sw-dw)/2;                        // object-position:center → x 중앙정렬
  const oy=0;                                // object-position:top
  return {ox, oy, s, iw, ih, dw, dh};
}
function furnPx(item){
  const {ox,oy,s,iw,ih}=getBgTransform();
  const fw=item.w*s;
  const fh=item.h ? item.h*s : null;
  const x=ox+(item.px/100)*iw*s;
  const y=oy+(item.py/100)*ih*s;
  return { x, y, fw, fh, cx: x+fw/2, cy: y+(fh||fw)/2 };
}

function spawnFurnFx(x,y,fw){
  const size=Math.max(80,Math.min(fw*1.4,280));
  const fx=document.createElement('img');
  fx.src='assets/가구효과.png'; fx.className='furn-fx';
  fx.style.left=`${x}px`; fx.style.top=`${y}px`;
  fx.style.width=`${size}px`; fx.style.height=`${size}px`;
  furnitureLayer.appendChild(fx);
  setTimeout(()=>fx.remove(),650);
}
function renderFurniture(animateId,animType){
  furnitureLayer.innerHTML='';
  const pack=getUnlockedPack(S.currentArtist);
  const allowedIds=pack ? pack.furnitureIds : [];
  FURNITURE.forEach(item=>{
    if(!allowedIds.includes(item.id)) return;
    if(S.inventory.furniture[item.id]!=='placed') return;
    const {x,y,fw,fh}=furnPx(item);
    const el=document.createElement('div'); el.className='furn-placed';
    el.style.cssText=`left:${x}px;top:${y}px;z-index:${item.z??Math.round(item.py)};`;
    if(item.id===animateId) el.classList.add(animType==='place'?'placing':'removing');
    const img=document.createElement('img');
    img.src=item.file; img.alt=item.name;
    img.style.width=`${fw}px`;
    if(fh) img.style.height=`${fh}px`;
    img.draggable=false;
    el.appendChild(img); furnitureLayer.appendChild(el);
    /* LP 플레이어/스피커: 탭 → LP모달, 더블탭 → 창고 */
    if(item.isLpPlayer){
      let lpTapStart=0, lpLastTap=0, lpOpenTimer=null, lpRemoving=false;
      el.addEventListener('pointerdown',e=>{
        e.stopPropagation(); lpTapStart=Date.now(); lpRemoving=false;
        const now=Date.now();
        if(now-lpLastTap<350){ clearTimeout(lpOpenTimer); lpLastTap=0; lpRemoving=true; storeFurniture(item.id); }
        else { lpLastTap=now; }
      });
      el.addEventListener('pointerup',()=>{
        if(!lpRemoving && Date.now()-lpTapStart<380){
          lpOpenTimer=setTimeout(()=>openLpModal(), 360);
        }
      });
    } else {
      let furnLastTap=0;
      el.addEventListener('pointerdown',e=>{
        e.stopPropagation();
        const now=Date.now();
        if(now-furnLastTap<320){ furnLastTap=0; storeFurniture(item.id); }
        else { furnLastTap=now; }
      });
    }
  });
}

let shopTab='gift';
function renderShop(){
  const grid=document.getElementById('shopGrid'); grid.innerHTML='';
  if(shopTab==='lp'){
    LP_RECORDS.forEach(item=>{
      const artistRec=S.inventory.records[S.currentArtist]||{};
      const owned=artistRec[item.id];
      const canBuy=!owned&&S.coins>=item.cost;
      const pillClass=owned?'owned-pill':canBuy?'buyable':'cant';
      const card=document.createElement('div'); card.className='item-card';
      card.innerHTML=`<div class="item-thumb"><img src="${item.file}" alt="${item.name}"></div>
        <div class="item-name">${item.name}</div>
        <button class="price-pill ${pillClass}" data-lp="${item.id}">${owned?'보유중':`C ${item.cost.toLocaleString('ko-KR')}`}</button>`;
      grid.appendChild(card);
    });
    grid.querySelectorAll('[data-lp].buyable').forEach(pill=>{
      pill.addEventListener('click',()=>{
        const item=LP_RECORDS.find(r=>r.id===pill.dataset.lp);
        if(!item||S.coins<item.cost) return;
        S.coins-=item.cost;
        if(!S.inventory.records[S.currentArtist]) S.inventory.records[S.currentArtist]={};
        S.inventory.records[S.currentArtist][item.id]=true;
        renderHud(); saveGame(); playSFX();
        pill.textContent='보유중'; pill.className='price-pill owned-pill';
      });
    });
    return;
  }
  const pack=getUnlockedPack(S.currentArtist);
  const allowedFurnIds=pack ? pack.furnitureIds : [];
  const items=[...(shopTab==='gift'?GIFTS:FURNITURE)]
    .filter(item=>{
      if(shopTab==='furniture' && !allowedFurnIds.includes(item.id)) return false;
      if(!item.requires) return true;
      const baseState=S.inventory.furniture[item.requires];
      return baseState==='owned'||baseState==='placed';
    })
    .filter(item=>shopTab!=='furniture'||S.inventory.furniture[item.id]==='shop')
    .sort((a,b)=>a.cost-b.cost);
  items.forEach(item=>{
    const inInv=shopTab==='gift'?false:(S.inventory.furniture[item.id]!=='shop');
    const canBuy=!inInv&&S.coins>=item.cost;
    const pillClass=inInv?'owned-pill':canBuy?'buyable':'cant';
    const pillText=inInv?'보유중':`C ${item.cost.toLocaleString('ko-KR')}`;
    const card=document.createElement('div'); card.className='item-card';
    card.innerHTML=`
      ${item.file?`<div class="item-thumb"><img src="${item.file}" alt="${item.name}" onerror="this.style.display='none'"></div>`:`<div class="item-emoji">${item.emoji}</div>`}
      <div class="item-name">${item.name}</div>
      <button class="price-pill ${pillClass}" data-buy="${item.id}">${pillText}</button>`;
    grid.appendChild(card);
  });
  grid.querySelectorAll('[data-buy].buyable').forEach(pill=>{
    pill.addEventListener('click',()=>{
      const item=[...GIFTS,...FURNITURE].find(f=>f.id===pill.dataset.buy);
      if(!item||S.coins<item.cost) return;
      S.coins-=item.cost;
      if(GIFTS.find(g=>g.id===item.id)) curGifts()[item.id]=(curGifts()[item.id]||0)+1;
      else S.inventory.furniture[item.id]='owned';
      renderHud(); saveGame();
      /* 이 pill만 즉시 보유중으로 — 다른 pill은 그대로 */
      pill.textContent='보유중';
      pill.className='price-pill owned-pill';
    });
  });
}
document.querySelectorAll('[data-stab]').forEach(tab=>{
  tab.addEventListener('click',()=>{
    const locked = !isArtistUnlocked(S.currentArtist);
    if(locked && tab.dataset.stab!=='gift'){ showToast('포카를 태그하면 열려요 🔒'); return; }
    document.querySelectorAll('[data-stab]').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active'); shopTab=tab.dataset.stab; renderShop();
  });
});

let dragState=null;
const dragGhost=document.getElementById('giftGhost');
const appEl=document.getElementById('app');

let letterDragGhostEl=null;
function startStorageDrag(e, type, id, visual, writtenData, writtenIdx){
  e.preventDefault();
  dragState={type,id,writtenData,writtenIdx};
  document.getElementById('storageSheet')?.classList.remove('open');
  document.getElementById('backdrop')?.classList.remove('show');
  document.querySelector('.bottom-nav')?.classList.remove('sheet-open');
  S.activeSheet=null;
  if(type==='writtenGift'){
    /* 편지/포춘쿠키 paper ghost */
    if(letterDragGhostEl) letterDragGhostEl.remove();
    const isFortune=id==='fortune';
    letterDragGhostEl=document.createElement('div');
    const maxCh=isFortune?28:50;
    const preview=writtenData.text.slice(0,maxCh)+(writtenData.text.length>maxCh?'…':'');
    letterDragGhostEl.style.cssText=`
      position:absolute;z-index:300;pointer-events:none;
      background:${writtenData.color};border-radius:${isFortune?'5px':'8px'};
      width:${isFortune?'130px':'90px'};
      box-shadow:0 4px 16px rgba(0,0,0,0.3);
      font-family:'BMHANNA',sans-serif;font-size:10px;
      color:#2a1a0a;padding:8px 10px;line-height:1.5;
      word-break:break-all;transform:translate(-50%,-55%) rotate(-3deg);
    `;
    letterDragGhostEl.textContent=preview;
    appEl.appendChild(letterDragGhostEl);
    const ar=appEl.getBoundingClientRect();
    letterDragGhostEl.style.left=`${e.clientX-ar.left}px`;
    letterDragGhostEl.style.top=`${e.clientY-ar.top}px`;
    dragGhost.style.display='none';
  } else {
    if(type==='furniture'){
      const item=FURNITURE.find(f=>f.id===id);
      dragGhost.innerHTML=item?`<img src="${item.file}" alt="${item.name}">`:'🛋';
    } else {
      dragGhost.innerHTML=''; dragGhost.textContent=visual;
    }
    dragGhost.style.display='block';
  }
  const ar=appEl.getBoundingClientRect();
  if(type!=='writtenGift'){
    dragGhost.style.left=`${e.clientX-ar.left}px`;
    dragGhost.style.top=`${e.clientY-ar.top}px`;
  }
}
appEl.addEventListener('pointermove',e=>{
  if(!dragState) return;
  const ar=appEl.getBoundingClientRect();
  if(dragState.type==='writtenGift'&&letterDragGhostEl){
    letterDragGhostEl.style.left=`${e.clientX-ar.left}px`;
    letterDragGhostEl.style.top=`${e.clientY-ar.top}px`;
  } else {
    dragGhost.style.left=`${e.clientX-ar.left}px`;
    dragGhost.style.top=`${e.clientY-ar.top}px`;
  }
},{passive:true});
function clearWrittenDrag(){
  if(letterDragGhostEl){ letterDragGhostEl.remove(); letterDragGhostEl=null; }
  dragState=null;
}
appEl.addEventListener('pointerup',e=>{
  if(!dragState) return;
  if(dragState.type==='writtenGift'){
    const storageSheet=document.getElementById('storageSheet');
    const sheetOpen=storageSheet.classList.contains('open');
    let onRoom=false;
    if(sheetOpen){
      /* 시트가 열려 있는 동안은 backdrop이 roomStage를 가리므로 Y 비교 */
      onRoom = e.clientY < storageSheet.getBoundingClientRect().top;
    } else {
      /* 시트가 닫혀 있으면 backdrop도 없으므로 elementFromPoint 정확 */
      const stageEl=document.getElementById('roomStage');
      const topEl=document.elementFromPoint(e.clientX,e.clientY);
      onRoom = !!(topEl&&stageEl.contains(topEl));
    }
    if(onRoom){
      const saved=dragState;
      clearWrittenDrag();
      walkAndDeliverGift('writtenGift',saved.id,saved.writtenData);
    }
    /* 방 밖 → ghost floating 유지, 다음 탭 대기 */
    return;
  }
  const sheet=document.getElementById('storageSheet');
  const sheetTop=sheet.getBoundingClientRect().top;
  const dropY=e.clientY;
  dragGhost.style.display='none';
  if(dropY<sheetTop){
    if(dragState.type==='gift') walkAndDeliverGift('gift',dragState.id,null);
    else placeFurniture(dragState.id);
    setTimeout(()=>renderStorage(),100);
  }
  dragState=null;
});

const bgmAudio=new Audio('audio/bgm.mp3'); bgmAudio.loop=true; bgmAudio.volume=0.7;
let lpAudio=null, bgmStarted=false, currentLpId=null;

/* iOS에서 cloneNode()는 gesture unlock 미상속 → 풀 방식으로 교체 */
function makePool(src,vol,n=4){
  return Array.from({length:n},()=>{const a=new Audio(src);a.volume=vol;return a;});
}
let sfxPool,furnPlacePool,furnRemovePool,giftPool,tapPool;
let sfxIdx=0,fpIdx=0,frIdx=0,gIdx=0,tIdx=0;
function initAudioPools(){
  sfxPool        = makePool('audio/효과음.mp3',   0.8);
  furnPlacePool  = makePool('audio/가구배치.mp3',  0.85);
  furnRemovePool = makePool('audio/가구빼기.mp3',  0.85);
  giftPool       = makePool('audio/선물주기.mp3',  0.9);
  tapPool        = makePool('audio/찌르기.mp3',    0.9);
  [...sfxPool,...furnPlacePool,...furnRemovePool,...giftPool,...tapPool].forEach(a=>{
    a.play().then(()=>{ a.pause(); a.currentTime=0; }).catch(()=>{});
  });
}
function playSFX(){
  if(!sfxPool) return;
  const a=sfxPool[sfxIdx++%sfxPool.length]; a.currentTime=0; a.play().catch(()=>{});
}
function playFurnPlace(){
  if(!furnPlacePool) return;
  const a=furnPlacePool[fpIdx++%furnPlacePool.length]; a.currentTime=0; a.play().catch(()=>{});
}
function playFurnRemove(){
  if(!furnRemovePool) return;
  const a=furnRemovePool[frIdx++%furnRemovePool.length]; a.currentTime=0; a.play().catch(()=>{});
}
function playGiftSFX(){
  if(!giftPool) return;
  const a=giftPool[gIdx++%giftPool.length]; a.currentTime=0; a.play().catch(()=>{});
}
function playTapSFX(){
  if(!tapPool) return;
  const a=tapPool[tIdx++%tapPool.length]; a.currentTime=0; a.play().catch(()=>{});
}

function startBGM(){
  if(bgmStarted) return; bgmStarted=true;
  initAudioPools();
  bgmAudio.play().catch(()=>{});
}
function playLP(record){
  if(lpAudio){ lpAudio.pause(); lpAudio=null; }
  bgmAudio.pause();
  currentLpId=record.id;
  lpAudio=new Audio(record.audio); lpAudio.loop=false; lpAudio.volume=bgmAudio.volume;
  lpAudio.addEventListener('ended', stopLP, {once:true});
  lpAudio.play().catch(()=>{});
}
function stopLP(){
  if(lpAudio){ lpAudio.pause(); lpAudio=null; } currentLpId=null;

const SAVE_KEY='ajit_save_v2';
function saveGame(){
  const data={
    coins: S.coins,
    currentArtist: S.currentArtist,
    inventory: S.inventory,
    artists: ARTISTS.map(a=>({id:a.id, level:a.level, fp:a.fp, fpMax:a.fpMax})),
    bgmVolume, sfxVolume,
    lastLogin: S.lastLogin,
    loginDay: S.loginDay,
    writtenGifts: S.writtenGifts,
    playerProfile: S.playerProfile,
    unlockedPacks: S.unlockedPacks,
    tutorialDone: S.tutorialDone,
    musicTutDone: S.musicTutDone,
    furnTutDone: S.furnTutDone,
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}
function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY); if(!raw) return;
    const data=JSON.parse(raw);
    if(data.coins!==undefined) S.coins=data.coins;
    if(data.currentArtist) S.currentArtist=data.currentArtist;
    if(data.inventory){
      /* gifts: {artistId:{giftId:count}} 구조, 구 포맷(giftId:count) 마이그레이션 */
      const savedGifts=data.inventory.gifts||{};
      if(savedGifts.dio||savedGifts.kai){
        ['dio','kai'].forEach(aid=>{
          if(savedGifts[aid]) Object.entries(savedGifts[aid]).forEach(([id,v])=>{ if(S.inventory.gifts[aid]&&id in S.inventory.gifts[aid]) S.inventory.gifts[aid][id]=v; });
        });
      } else {
        /* 구 포맷: 모든 아티스트에 동일하게 적용 */
        Object.entries(savedGifts).forEach(([id,v])=>{ ['dio','kai'].forEach(aid=>{ if(S.inventory.gifts[aid]&&id in S.inventory.gifts[aid]) S.inventory.gifts[aid][id]=v; }); });
      }
      Object.entries(data.inventory.furniture||{}).forEach(([id,v])=>{ if(id in S.inventory.furniture) S.inventory.furniture[id]=v; });
      /* records: {artistId:{recordId:bool}} 구조 */
      const savedRec=data.inventory.records||{};
      if(savedRec.dio||savedRec.kai){
        ['dio','kai'].forEach(aid=>{
          if(savedRec[aid]) Object.entries(savedRec[aid]).forEach(([id,v])=>{ if(S.inventory.records[aid]&&id in S.inventory.records[aid]) S.inventory.records[aid][id]=v; });
        });
      } else {
        /* 구 포맷 마이그레이션 (recordId:bool) */
        Object.entries(savedRec).forEach(([id,v])=>{ ['dio','kai'].forEach(aid=>{ if(S.inventory.records[aid]&&id in S.inventory.records[aid]) S.inventory.records[aid][id]=v; }); });
      }
    }
    (data.artists||[]).forEach(saved=>{
      const a=ARTISTS.find(x=>x.id===saved.id); if(!a) return;
      a.level=saved.level; a.fp=saved.fp; a.fpMax=saved.fpMax;
    });
    if(data.bgmVolume!==undefined){ bgmVolume=data.bgmVolume; bgmAudio.volume=bgmVolume/100; }
    if(data.sfxVolume!==undefined){ sfxVolume=data.sfxVolume; }
    if(data.lastLogin!==undefined) S.lastLogin=data.lastLogin;
    if(data.loginDay!==undefined)  S.loginDay=data.loginDay;
    /* writtenGifts: {artistId:[...]} 구조, 구 포맷([...]) 마이그레이션 */
    if(Array.isArray(data.writtenGifts)){ S.writtenGifts={ dio: data.writtenGifts, kai: [] }; }
    else if(data.writtenGifts && typeof data.writtenGifts==='object'){ ['dio','kai'].forEach(aid=>{ if(Array.isArray(data.writtenGifts[aid])) S.writtenGifts[aid]=data.writtenGifts[aid]; }); }
    if(data.playerProfile) Object.assign(S.playerProfile, data.playerProfile);
    if(Array.isArray(data.unlockedPacks)) S.unlockedPacks=data.unlockedPacks;
    if(data.tutorialDone) S.tutorialDone=true;
    if(data.musicTutDone) S.musicTutDone=true;
    if(data.furnTutDone) S.furnTutDone=true;
  }catch(e){ console.warn('세이브 불러오기 실패',e); }
}

let nfcReader = null;
function handleNfcId(rawId){
  const statusEl = document.getElementById('nfcStatus');
  // 콜론/공백 등 구분자 제거 후 순수 hex로 비교
  const stripHex = s => (s||'').toLowerCase().replace(/[^0-9a-f]/g,'');
  const normalized = stripHex(rawId);
  if(!normalized){ if(statusEl) statusEl.textContent = '⚠️ 태그 ID를 읽지 못했어요'; return; }
  const pack = PACKS.find(p=>stripHex(p.nfcId)===normalized);
  if(pack){
    unlockPack(pack.id);
    if(statusEl) statusEl.textContent = '';
  } else {
    if(statusEl) statusEl.textContent = `⚠️ 등록되지 않은 포카예요 (ID: ${normalized})`;
  }
}
async function startNfcScan(){
  const statusEl = document.getElementById('nfcStatus');
  /* ── Capacitor AjitNFC 플러그인 (iOS/Android 네이티브 앱) ── */
  if(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()){
    try{
      if(statusEl) statusEl.textContent = '📡 포카를 기기 뒷면에 가져다 대세요…';
      const { Plugins } = window.Capacitor;
      const AjitNFC = Plugins.AjitNFC;
      if(!AjitNFC){ if(statusEl) statusEl.textContent = 'NFC 플러그인 로드 실패'; return; }
      AjitNFC.addListener('nfcTagScanned', event=>{
        handleNfcId(event?.tagId || '');
      });
      await AjitNFC.startScanning();
    } catch(e){ if(statusEl) statusEl.textContent = `오류: ${e.message}`; }
    return;
  }
  /* ── Web NFC (Android Chrome) ── */
  if('NDEFReader' in window){
    try{
      if(statusEl) statusEl.textContent = '📡 포카를 기기 뒷면에 가져다 대세요…';
      nfcReader = new NDEFReader();
      await nfcReader.scan();
      nfcReader.addEventListener('reading', ({ serialNumber, message })=>{
        if(serialNumber) handleNfcId(serialNumber);
        // NDEF 레코드에 ID가 있는 경우도 시도
        else if(message?.records?.length){
          const rec = message.records[0];
          const text = rec.data ? new TextDecoder().decode(rec.data) : '';
          if(text) handleNfcId(text);
        }
      });
      nfcReader.addEventListener('readingerror', ()=>{
        if(statusEl) statusEl.textContent = '📛 NDEF 데이터가 없는 태그예요. 포카 뒷면에 NFC칩이 있는지 확인해주세요.';
      });
    } catch(e){ if(statusEl) statusEl.textContent = `오류: ${e.message}`; }
    return;
  }
  /* 삼성 인터넷 등 미지원 브라우저 안내 */
  const isSamsungBrowser = /SamsungBrowser/i.test(navigator.userAgent);
  if(statusEl) statusEl.innerHTML = isSamsungBrowser
    ? '삼성 인터넷은 NFC를 지원하지 않아요.<br><b>Chrome 앱</b>으로 접속해주세요.'
    : 'NFC가 지원되지 않는 브라우저예요.<br>Android Chrome에서 접속해주세요.';
}

function unlockPack(packId){
  if(S.unlockedPacks.includes(packId)) return;
  S.unlockedPacks.push(packId);
  const pack = PACKS.find(p=>p.id===packId);
  /* 해금된 아티스트 아지트로 즉시 이동 */
  if(pack?.artistId) S.currentArtist = pack.artistId;
  const spawnX=240/402*100, spawnY=518/874*100;
  player.x=spawnX; player.y=spawnY; player.tx=spawnX; player.ty=spawnY; player.dx=0; player.dy=0;
  stopPlayerWalk();
  saveGame();
  buildArtist(); renderHud(); updateRoomLock();
  const bgEl=document.querySelector('.room-bg');
  if(bgEl.complete && bgEl.naturalWidth) renderFurniture();
  else bgEl.addEventListener('load', ()=>renderFurniture(), {once:true});
  showNfcSplash(!S.tutorialDone ? ()=>startTutorial() : null);
  showToast(`🎉 ${pack?.name||'아지트'} 해금!`);
}

let tutStep = 0;
function startTutorial(){
  if(S.tutorialDone) return;
  tutStep = 0;
  document.getElementById('tutorialOverlay').classList.add('active');
  showTutStep(0);
  document.getElementById('tutorialOverlay').addEventListener('pointerdown', advanceTutorial, {passive:true});
}
function advanceTutorial(){
  tutStep++;
  if(tutStep >= TUTORIAL_STEPS.length){ endTutorial(); return; }
  showTutStep(tutStep);
}
function endTutorial(){
  document.getElementById('tutorialOverlay').classList.remove('active');
  document.getElementById('tutorialOverlay').removeEventListener('pointerdown', advanceTutorial);
  S.tutorialDone = true;
  saveGame();
  setTimeout(()=>checkDailyLogin(), 400);
}
function showTutStep(idx){
  const step = TUTORIAL_STEPS[idx];
  const app = document.getElementById('app');
  const ar = app.getBoundingClientRect();
  const target = document.querySelector(step.selector);
  const spotlight = document.getElementById('tutSpotlight');
  const bubble = document.getElementById('tutBubble');
  if(!target){ advanceTutorial(); return; }
  const tr = target.getBoundingClientRect();
  const pad = step.shape === 'circle' ? 12 : 10;
  const left = tr.left - ar.left - pad;
  const top  = tr.top  - ar.top  - pad;
  const w    = tr.width  + pad * 2;
  const h    = tr.height + pad * 2;
  spotlight.className = 'tut-spotlight ' + step.shape;
  spotlight.style.cssText = `left:${left}px;top:${top}px;width:${w}px;height:${h}px;`;
  bubble.textContent = step.text;
  const bw = 260;
  let bLeft = left + w/2 - bw/2;
  bLeft = Math.max(8, Math.min(ar.width - bw - 8, bLeft));
  if(step.pos === 'bottom'){
    bubble.style.cssText = `left:${bLeft}px;top:${top + h + 18}px;width:${bw}px;`;
  } else if(step.pos === 'top'){
    let bTop = top - 18;
    bubble.style.cssText = `left:${bLeft}px;top:${Math.max(8, bTop - 90)}px;width:${bw}px;`;
  } else {
    let bTop = top + h + 18;
    if(bTop + 100 > ar.height) bTop = top - 120;
    bubble.style.cssText = `left:${bLeft}px;top:${bTop}px;width:${bw}px;`;
  }
}

/* ══ 로딩 화면 ══ */
function hideLoadingScreen(){
  const el = document.getElementById('loadingScreen');
  el.style.transition = 'opacity 0.4s';
  el.style.opacity = '0';
  setTimeout(() => el.classList.add('hidden'), 420);
}
function preloadAndStart(){
  const srcs = [
    'assets/배경.png','assets/카이_배경.png','assets/카이_배경_2.png',
    'assets/디오_앞.png','assets/디오_깜짝.png',
    'assets/디오_웃음_1.png','assets/디오_웃음_2.png','assets/디오_웃음_3.png','assets/디오_웃음_4.png',
    'assets/디오_걷기_1.png','assets/디오_걷기_2.png','assets/디오_걷기_3.png','assets/디오_걷기_4.png',
    'assets/카이_앞.png','assets/카이_깜짝.png',
    'assets/카이_웃음_1.png','assets/카이_웃음_2.png','assets/카이_웃음_3.png','assets/카이_웃음_4.png',
    'assets/카이_걷기_1.png','assets/카이_걷기_2.png','assets/카이_걷기_3.png','assets/카이_걷기_4.png',
    'assets/기본홈.svg',
  ];
  let loaded = 0;
  const minTime = new Promise(r => setTimeout(r, 5000));
  const imgLoad = new Promise(r => {
    srcs.forEach(src => {
      const img = new Image();
      img.onload = img.onerror = () => { if(++loaded >= srcs.length) r(); };
      img.src = src;
    });
  });
  Promise.all([minTime, imgLoad, document.fonts.ready]).then(() => {
    if(!S.playerProfile.name) window._openSetup();
    else {
      window._updateProfileLabel();
      if(!S.tutorialDone && S.unlockedPacks.length > 0) startTutorial();
      else if(S.tutorialDone) checkDailyLogin();
    }
    hideLoadingScreen();
  });
}

document.getElementById('nfcScanBtn').addEventListener('click', startNfcScan);
document.getElementById('nfcTestBtn').addEventListener('click', ()=>{
  /* 아직 해금되지 않은 첫 번째 팩을 해금 */
  const pack = PACKS.find(p=>!S.unlockedPacks.includes(p.id));
  if(pack) unlockPack(pack.id);
  else showToast('모든 아지트가 열려있어요 🎉');
});

/* ══ 초기화 ══ */
loadGame();
buildArtist(); buildPlayer(); renderHud(); renderFurniture(); schedWander(); loop();
updateRoomLock();
preloadAndStart();

/* 화면 크기 바뀌면 가구 위치 재계산 (가로/세로 회전, 리사이즈) */
window.addEventListener('resize', ()=>renderFurniture());
document.querySelector('.room-bg').addEventListener('load', ()=>renderFurniture());

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
